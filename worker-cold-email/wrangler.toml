name = "opti-cds-cold-email"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Cron DÉSACTIVÉ tant que la phase de revue n'est pas finie.
# Pour activer l'envoi automatique, décommenter la ligne crons ci-dessous et redeploy.
[triggers]
crons = []
# crons = ["0 9 * * 1-5"]

# Base SQLite Cloudflare D1 (contacts + tracking)
[[d1_databases]]
binding = "DB"
database_name = "optids-cold"
database_id = "0fae6f3c-62d8-4c4d-ad53-dc049834d6cc"

# Secrets à set via : wrangler secret put RESEND_API_KEY
# - RESEND_API_KEY    : ta clé Resend
# - WEBHOOK_SECRET    : secret partagé Resend pour vérifier les webhooks (bounces/complaints)
# - UNSUBSCRIBE_SALT  : random string pour signer les liens de désinscription

[vars]
FROM_EMAIL = "Sacha Bitoun <sacha@opti-cds.fr>"
REPLY_TO   = "sacha@opti-cds.fr"
DAILY_LIMIT = "30"
DRY_RUN = "false"
BASE_URL = "https://opti-cds-cold-email.sachabitoun17.workers.dev"
