name: Daily publish

# Rebuild + redéploie le site sur Cloudflare Pages.
#
# Effet quand actif : un nouvel article du calendrier éditorial
# (content/posts.ts) devient visible automatiquement à sa date de
# publication, sans intervention manuelle.
#
# ETAT ACTUEL : DÉSACTIVÉ (pas de cron).
#   Seul le déclenchement manuel via "workflow_dispatch" est possible
#   depuis l'onglet Actions de GitHub. Pour réactiver le drip quotidien,
#   décommenter le bloc "schedule" ci-dessous.
#
# Pré-requis si on réactive un jour :
#   1. Workflow doit être sur la branche par DÉFAUT (main).
#   2. Settings → Secrets and variables → Actions :
#        - Secret  CLOUDFLARE_API_TOKEN   (token avec permission "Cloudflare Pages : Edit")
#        - Secret  CLOUDFLARE_ACCOUNT_ID  (dadded28b1d9f58295d135e40875d2f1)
#        - Variable CF_PAGES_PROJECT      (nom du projet Pages : "subv")

on:
  # schedule:
  #   - cron: "0 6 * * *"   # tous les jours à 06:00 UTC (~8h Paris)
  workflow_dispatch: {}    # déclenchement manuel uniquement

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy out --project-name="${{ vars.CF_PAGES_PROJECT }}" --branch=main
